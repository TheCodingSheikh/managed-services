apiVersion: managedservices.thecodingsheikh.io/v1alpha1
kind: Webapp
metadata:
  name: "${{ values.tenant }}-tenant-${{ values.params.name }}-webapp"
  annotations:
    lab.backstage.io/add-to-catalog: "true"
    lab.backstage.io/system-type: app
    lab.backstage.io/component-type: service
    lab.backstage.io/lifecycle: managed
    lab.backstage.io/dependsOn: component:default/${{ values.tenant }}-tenant
    lab.backstage.io/title: ${{ values.tenant | replace("-", " ") | title }} Tenant ${{ values.params.name | replace("-", " ") | title }} Webapp
    lab.backstage.io/name: ${{ values.tenant }}-tenant-${{ values.params.name }}-webapp
    lab.backstage.io/system: webapp
    lab.backstage.io/owners: '{% for owner in values.owners %}${{ owner.subject }}:${{ owner.role }}{% if not loop.last %},{% endif %}{%- endfor %}'
    lab.backstage.io/kubernetes-label-selector: 'app.kubernetes.io/instance=${{ values.tenant }}-tenant-${{ values.params.name }}-webapp'
    lab.backstage.io/links: |-
      [
        {
          "url": "http://${{ values.tenant }}-tenant-${{ values.params.name }}-webapp.${{ values.tenant }}-tenant-${{ values.params.name }}-webapp.svc.cluster.local",
          "title": "Internal Service",
          "icon": "web"
        }{%- if values.params.host %},
        {
          "url": "https://${{ values.params.host }}",
          "title": "Public Endpoint",
          "icon": "web"
        }{%- endif %}
      ]
    backstage.io/last-applied-configuration: '${{ values.params | dump }}'
    backstage.io/scaffolder-template: template:default/webapp
    backstage.io/immutable-fields: 'tenant,name'
  label:
    app.kubernetes.io/instance: '${{ values.tenant }}-tenant-${{ values.params.name }}-webapp'
spec:
  values:
    tenant: ${{ values.tenant }}
    name: ${{ values.params.name }}
    image: ${{ values.params.image }}
    replicas: ${{ values.params.replicas }}
    port: ${{ values.params.port }}
    host: ${{ values.params.host }}
    {%- if values.params.env %}
    env:
      {%- for e in values.params.env %}
      - name: ${{ e.name }}
        value: ${{ e.value }}
      {%- endfor %}
    {%- endif %}
    {%- if values.params.envFromSecrets %}
    envFromSecrets:
      {%- for s in values.params.envFromSecrets %}
      - ${{ s }}
      {%- endfor %}
    {%- endif %}
    resources:
      cpu: ${{ values.params.resources.cpu }}
      memory: ${{ values.params.resources.memory }}
      cpuLimit: ${{ values.params.resources.cpuLimit }}
      memoryLimit: ${{ values.params.resources.memoryLimit }}
