apiVersion: managedservices.thecodingsheikh.io/v1alpha1
kind: Postgres
metadata:
  name: "${{ values.params.tenant }}-tenant-${{ values.params.name }}-postgres"
  annotations:
    lab.backstage.io/add-to-catalog: "true"
    lab.backstage.io/system-type: app
    lab.backstage.io/component-type: service
    lab.backstage.io/lifecycle: managed
    lab.backstage.io/dependsOn: component:default/${{ values.params.tenant }}-tenant
    lab.backstage.io/title: ${{ values.params.tenant | replace("-", " ") | title }} Tenant ${{ values.params.name | replace("-", " ") | title }} Postgres
    lab.backstage.io/name: ${{ values.params.tenant }}-tenant-${{ values.params.name }}-postgres
    lab.backstage.io/system: postgres
    lab.backstage.io/owners: '{% for owner in values.owners %}${{ owner.subject }}:${{ owner.role }}{% if not loop.last %},{% endif %}{%- endfor %}'
    lab.backstage.io/kubernetes-label-selector: 'app.kubernetes.io/instance=${{ values.params.tenant }}-tenant-${{ values.params.name }}-postgres'
    lab.backstage.io/links: |-
      [
        {%- for u in values.params.users %}
        {
          "url": "postgresql://${{ values.params.tenant }}-tenant-${{ values.params.name }}-postgres-primary.${{ values.params.tenant }}-tenant-postgres-${{ values.params.name }}.svc.cluster.local:5432/${{ u.databases[0] }}",
          "title": "${{ u.name }} @ ${{ u.databases[0] }}",
          "icon": "storage"
        }{%- if not loop.last %},{%- endif %}
        {%- endfor %}
      ]
    backstage.io/last-applied-configuration: '${{ values.params | dump }}'
    backstage.io/scaffolder-template: template:default/postgres
    backstage.io/immutable-fields: 'tenant,name'
  label:
    app.kubernetes.io/instance: '${{ values.params.tenant }}-tenant-${{ values.params.name }}-postgres'
spec:
  values:
    tenant: ${{ values.params.tenant }}
    name: ${{ values.params.name }}
    version: ${{ values.params.version }}
    replicas: ${{ values.params.replicas }}
    storageSize: ${{ values.params.storageSize }}
    storageClass: ${{ values.params.storageClass }}
    resources:
      cpu: ${{ values.params.resources.cpu }}
      memory: ${{ values.params.resources.memory }}
      cpuLimit: ${{ values.params.resources.cpuLimit }}
      memoryLimit: ${{ values.params.resources.memoryLimit }}
    backups:
      enabled: ${{ values.params.backups.enabled }}
      schedule: ${{ values.params.backups.schedule }}
      retention: ${{ values.params.backups.retention }}
    {%- if values.params.users %}
    users:
      {%- for u in values.params.users %}
      - name: ${{ u.name }}
        {%- if u.databases %}
        databases:
          {%- for db in u.databases %}
          - ${{ db }}
          {%- endfor %}
        {%- endif %}
      {%- endfor %}
    {%- endif %}
