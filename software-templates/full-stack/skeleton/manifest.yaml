apiVersion: managedservices.thecodingsheikh.io/v1alpha1
kind: FullStack
metadata:
  name: "${{ values.tenant }}-tenant-${{ values.params.name }}-full-stack"
  annotations:
    lab.backstage.io/add-to-catalog: "true"
    lab.backstage.io/system-type: app
    lab.backstage.io/component-type: service
    lab.backstage.io/lifecycle: managed
    lab.backstage.io/dependsOn: component:default/${{ values.tenant }}-tenant
    lab.backstage.io/title: ${{ values.tenant | replace("-", " ") | title }} Tenant ${{ values.params.name | replace("-", " ") | title }} Full Stack
    lab.backstage.io/name: ${{ values.tenant }}-tenant-${{ values.params.name }}-full-stack
    lab.backstage.io/system: full-stack
    lab.backstage.io/owners: '{% for owner in values.owners %}${{ owner.subject }}:${{ owner.role }}{% if not loop.last %},{% endif %}{%- endfor %}'
    lab.backstage.io/kubernetes-label-selector: 'app.kubernetes.io/instance=${{ values.tenant }}-tenant-${{ values.params.name }}-full-stack'
    lab.backstage.io/links: |-
      [
        {
          "url": "http://${{ values.tenant }}-tenant-${{ values.params.name }}-full-stack-app.${{ values.tenant }}-tenant-full-stack-${{ values.params.name }}.svc.cluster.local",
          "title": "Webapp (internal)",
          "icon": "web"
        }{%- if values.params.webapp.host %},
        {
          "url": "https://${{ values.params.webapp.host }}",
          "title": "Webapp (public)",
          "icon": "web"
        }{%- endif %},
        {
          "url": "postgresql://${{ values.tenant }}-tenant-${{ values.params.name }}-full-stack-db-primary.${{ values.tenant }}-tenant-full-stack-${{ values.params.name }}.svc.cluster.local:5432/${{ values.params.db.database }}",
          "title": "Postgres (${{ values.params.db.user }} @ ${{ values.params.db.database }})",
          "icon": "storage"
        }
      ]
    backstage.io/last-applied-configuration: '${{ values.params | dump }}'
    backstage.io/scaffolder-template: template:default/full-stack
    backstage.io/immutable-fields: 'tenant,name'
  label:
    app.kubernetes.io/instance: '${{ values.tenant }}-tenant-${{ values.params.name }}-full-stack'
spec:
  values:
    tenant: ${{ values.tenant }}
    name: ${{ values.params.name }}
    webapp:
      image: ${{ values.params.webapp.image }}
      replicas: ${{ values.params.webapp.replicas }}
      port: ${{ values.params.webapp.port }}
      host: ${{ values.params.webapp.host }}
      {%- if values.params.webapp.env %}
      env:
        {%- for e in values.params.webapp.env %}
        - name: ${{ e.name }}
          value: ${{ e.value }}
        {%- endfor %}
      {%- endif %}
      resources:
        cpu: ${{ values.params.webapp.resources.cpu }}
        memory: ${{ values.params.webapp.resources.memory }}
        cpuLimit: ${{ values.params.webapp.resources.cpuLimit }}
        memoryLimit: ${{ values.params.webapp.resources.memoryLimit }}
    postgres:
      version: ${{ values.params.postgres.version }}
      replicas: ${{ values.params.postgres.replicas }}
      storageSize: ${{ values.params.postgres.storageSize }}
      storageClass: ${{ values.params.postgres.storageClass }}
      resources:
        cpu: ${{ values.params.postgres.resources.cpu }}
        memory: ${{ values.params.postgres.resources.memory }}
        cpuLimit: ${{ values.params.postgres.resources.cpuLimit }}
        memoryLimit: ${{ values.params.postgres.resources.memoryLimit }}
      backups:
        enabled: ${{ values.params.postgres.backups.enabled }}
        schedule: ${{ values.params.postgres.backups.schedule }}
        retention: ${{ values.params.postgres.backups.retention }}
    db:
      user: ${{ values.params.db.user }}
      database: ${{ values.params.db.database }}
      {%- if values.params.db.envVars %}
      envVars:
        {%- for e in values.params.db.envVars %}
        - name: ${{ e.name }}
          secretKey: ${{ e.secretKey }}
        {%- endfor %}
      {%- endif %}
