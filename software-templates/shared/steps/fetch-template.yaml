id: fetch-skeleton
name: Scaffold Project Files
action: fetch:template
input:
  url: ./skeleton
  targetPath: ./output
  values:
    params: ${{ parameters }}
    # parameters.tenant comes from EntityPicker as "component:default/<short>-tenant".
    # parseEntityRef → { kind, namespace, name="<short>-tenant" }; slice off the trailing "-tenant" (7 chars).
    tenant: ${{ (parameters.tenant | parseEntityRef | pick('name')).slice(0, -7) }}
