apiVersion: capsule.clastix.io/v1beta2
kind: Tenant
metadata:
  name: {{ include "lib.fullname" . }}
  labels:
    {{- include "lib.labels" . | nindent 4 }}
  annotations:
    {{- include "lib.argocdAnnotations" . | nindent 4 }}
spec:
  forceTenantPrefix: true
  owners:
    {{- range .Values.owners }}
    - name: {{ .subject | quote }}
      kind: Group
      clusterRoles:
        - {{ .role }}
        {{- if eq .role "admin" }}
        - capsule-namespace-deleter
        {{- end }}
    {{- end }}
    - name: system:serviceaccount:argo-cd:argocd-application-controller
      kind: ServiceAccount
      clusterRoles:
        - admin
        - capsule-namespace-deleter
  namespaceOptions:
    additionalMetadataList:
      - labels:
          pod-security.kubernetes.io/enforce: baseline
        annotations:
          lab.backstage.io/owners: "{{- range $i, $o := .Values.owners }}{{ if $i }},{{ end }}{{ $o.subject }}:{{ $o.role }}{{- end }}"
  ingressOptions:
    hostnameCollisionScope: Cluster
